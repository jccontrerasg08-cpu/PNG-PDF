name: Build and deploy anythingintopdfbot

on:
  push:
    branches: ["main", "master", "work"]
  workflow_dispatch:

env:
  IMAGE_NAME: anythingintopdfbot
  KUBE_NAMESPACE: anythingintopdfbot

jobs:
  build:
    name: Build and push container
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.image.outputs.image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image reference
        id: image
        run: echo "image=ghcr.io/${GITHUB_REPOSITORY_OWNER}/${IMAGE_NAME}:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.image.outputs.image }}
            ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:latest

  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
    env:
      KUBE_CONFIG_CONTENT: ${{ secrets.KUBE_CONFIG }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Skip deployment when KUBE_CONFIG is missing
        if: ${{ env.KUBE_CONFIG_CONTENT == '' }}
        run: echo "KUBE_CONFIG secret is not set; image was pushed, Kubernetes deployment skipped."

      - name: Install kubectl
        if: ${{ env.KUBE_CONFIG_CONTENT != '' }}
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        if: ${{ env.KUBE_CONFIG_CONTENT != '' }}
        run: |
          mkdir -p ~/.kube
          printf '%s' "$KUBE_CONFIG_CONTENT" > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Set image for this commit
        if: ${{ env.KUBE_CONFIG_CONTENT != '' }}
        run: |
          cd k8s
          kubectl kustomize . | \
            sed "s#image: .*anythingintopdfbot.*#image: ${{ needs.build.outputs.image }}#" | \
            kubectl apply -f -

      - name: Wait for rollout
        if: ${{ env.KUBE_CONFIG_CONTENT != '' }}
        run: kubectl rollout status deployment/anythingintopdfbot -n "$KUBE_NAMESPACE"
