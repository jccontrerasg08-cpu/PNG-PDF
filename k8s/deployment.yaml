apiVersion: apps/v1
kind: Deployment
metadata:
  name: anythingintopdfbot
  labels:
    app: anythingintopdfbot
spec:
  replicas: 2
  selector:
    matchLabels:
      app: anythingintopdfbot
  template:
    metadata:
      labels:
        app: anythingintopdfbot
    spec:
      containers:
        - name: anythingintopdfbot
          image: anythingintopdfbot:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
