apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: anythingintopdfbot
  labels:
    app: anythingintopdfbot
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "25m"
spec:
  ingressClassName: nginx
  rules:
    - host: anythingintopdfbot.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: anythingintopdfbot
                port:
                  name: http
